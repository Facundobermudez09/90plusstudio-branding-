<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&amp;display=swap');
      .story-font { font-family: 'Geist', sans-serif; }
    </style>
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="#171717" stroke-width="1.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="#000000" />
  
  <!-- Grid -->
  <rect width="1080" height="1920" fill="url(#grid)" opacity="0.6" />

  <!-- Margins -->
  <rect x="60" y="60" width="960" height="1800" fill="none" stroke="#171717" stroke-width="2" />
  <line x1="60" y1="360" x2="1020" y2="360" stroke="#171717" stroke-width="2" />
  <line x1="60" y1="1560" x2="1020" y2="1560" stroke="#171717" stroke-width="2" />

  <!-- Top Mini Title -->
  <g transform="translate(540, 180)">
    <text text-anchor="middle" class="story-font" font-weight="700" font-size="24" letter-spacing="16" fill="#888888">METODOLOGÍA</text>
  </g>

  <!-- Giant Logo Centered -->
  <g transform="translate(540, 780)">
    <!-- Scale drawing of logo 90+ -->
    <g transform="translate(-192, -192) scale(6)">
      <!-- Number 9 shape -->
      <path d="M 25 29 A 7 7 0 1 0 11 29 A 7 7 0 1 0 25 29 M 25 29 L 25 36 A 7 7 0 0 1 18 43" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Number 0 shape -->
      <rect x="31" y="22" width="14" height="21" rx="7" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Plus sign (+) -->
      <path d="M 48 27 L 54 27 M 51 24 L 51 30" fill="none" stroke="#39FF14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  <!-- Brand Typography -->
  <g transform="translate(540, 1180)">
    <text text-anchor="middle" class="story-font" font-weight="800" font-size="56" letter-spacing="18" fill="#FFFFFF">90<tspan fill="#39FF14">+</tspan> STUDIO</text>
    <text y="70" text-anchor="middle" class="story-font" font-weight="600" font-size="24" letter-spacing="6" fill="#555555">DISEÑO  &bull;  DESARROLLO  &bull;  EVOLUCIÓN</text>
  </g>

  <!-- Closing Quote -->
  <g transform="translate(120, 1440)">
    <rect x="0" y="0" width="840" height="2" fill="#171717" />
    <text y="60" class="story-font" font-weight="400" font-size="30" fill="#888888">Creamos soluciones digitales pensadas para crecer.</text>
    <text x="840" y="60" class="story-font" font-weight="700" font-size="24" fill="#39FF14" text-anchor="end">90plus.studio</text>
  </g>

  <!-- Footer -->
  <g transform="translate(540, 1790)">
    <text text-anchor="middle" class="story-font" font-weight="700" font-size="18" fill="#555555" letter-spacing="4">90+ STUDIO &bull; 2026</text>
  </g>
</svg>
